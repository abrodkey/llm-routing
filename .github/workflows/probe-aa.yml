name: Probe AA-Omniscience (temporary)

# Throwaway diagnostic: checks whether our AA_API_KEY has Pro+ access to the
# language/models endpoint and whether aa_omniscience_* fields are returned.
# The key is only ever used as a request header — never printed. Delete after use.

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe AA endpoints
        env:
          AA_API_KEY: ${{ secrets.AA_API_KEY }}
        run: |
          python3 - <<'PY' | tee -a "$GITHUB_STEP_SUMMARY"
          import os, json, urllib.request
          key = os.environ["AA_API_KEY"]
          def probe(url):
              req = urllib.request.Request(url, headers={"x-api-key": key})
              try:
                  with urllib.request.urlopen(req, timeout=40) as r:
                      return r.status, json.loads(r.read().decode())
              except urllib.error.HTTPError as e:
                  return e.code, None
              except Exception as e:
                  return f"ERR {type(e).__name__}", None

          print("## AA-Omniscience API probe\n")
          # 1) Current endpoint (sanity)
          st, p = probe("https://artificialanalysis.ai/api/v2/data/llms/models")
          n = len(p.get("data", p)) if isinstance(p, (dict, list)) and p else 0
          print(f"- `data/llms/models` (current): status **{st}**, {n} rows\n")

          # 2) language/models LIST — does our key get omniscience fields?
          st, p = probe("https://artificialanalysis.ai/api/v2/language/models")
          print(f"- `language/models` (list): status **{st}**")
          if p:
              rows = p.get("data", p) if isinstance(p, dict) else p
              ev_keys = set()
              for row in (rows or [])[:50]:
                  ev_keys |= set((row.get("evaluations") or {}).keys())
              omni = sorted(k for k in ev_keys if "omnisc" in k.lower() or "halluc" in k.lower())
              print(f"  - rows: {len(rows) if rows else 0}")
              print(f"  - omniscience/hallucination fields present: **{omni or 'NONE'}**")
              # sample a value if present
              if omni and rows:
                  for row in rows:
                      ev = row.get("evaluations") or {}
                      if any(k in ev for k in omni):
                          print(f"  - sample: {row.get('name')} -> " + ", ".join(f"{k}={ev.get(k)}" for k in omni))
                          break
          print("")
          # 3) Tier verdict
          print("### Verdict")
          if st == 200 and p:
              print("Key reaches `language/models`. If omniscience fields are listed above, **Pro+ access confirmed**.")
          elif st in (401, 403):
              print(f"Status **{st}** — key is **NOT Pro+** for this endpoint (free/insufficient tier). Omniscience needs a paid AA subscription.")
          else:
              print(f"Unexpected status {st} — inspect manually.")
          PY
